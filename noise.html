<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise Test</title>

<style>

html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
}

canvas{
display:block;
width:100%;
height:100%;
}

</style>

</head>

<body>

<canvas id="noise"></canvas>

<script>

const canvas=document.getElementById("noise");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();

window.addEventListener("resize",resize);

let glitchOffset=0;
let glitchTimer=0;

function draw(){

let img=ctx.createImageData(canvas.width,canvas.height);

for(let y=0;y<canvas.height;y++){

let rowNoise=Math.random()*70;

for(let x=0;x<canvas.width;x++){

let i=(y*canvas.width+x)*4;

let c=Math.random()*185+rowNoise;

if(c>255)c=255;

img.data[i]=c;
img.data[i+1]=c;
img.data[i+2]=c;
img.data[i+3]=255;

}

}

ctx.putImageData(img,0,0);
glitchTimer++;

if(glitchTimer>25){

glitchTimer=0;

glitchOffset=(Math.random()-0.5)*12;

}

ctx.save();

ctx.globalAlpha=0.08;

ctx.drawImage(canvas,glitchOffset,0);

ctx.restore();

// خطوط افقی تلویزیون
ctx.fillStyle="rgba(0,0,0,0.18)";

for(let y=0;y<canvas.height;y+=3){

ctx.fillRect(0,y,canvas.width,1);

}

requestAnimationFrame(draw);

}

draw();

</script>

</body>
</html>
